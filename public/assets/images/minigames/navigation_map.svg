<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" xmlns:xlink="http://www.w3.org/1999/xlink">
  <rect width="700" height="500" fill="#020204"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#0f0f1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="700" height="500" fill="url(#grid)"/>

  <!-- Комнаты -->
  <g fill="none" stroke="rgba(200,192,176,0.2)" stroke-width="1.5">
    <!-- Старт: комната Громова -->
    <rect x="20" y="210" width="90" height="60" rx="2"/>
    <!-- Жилой блок -->
    <rect x="160" y="180" width="80" height="120" rx="2"/>
    <!-- Центральный узел -->
    <rect x="300" y="200" width="100" height="80" rx="2"/>
    <!-- Сектор А -->
    <rect x="460" y="100" width="80" height="60" rx="2"/>
    <!-- Сектор Б (цель) -->
    <rect x="580" y="200" width="100" height="80" rx="2"/>
    <!-- Сектор В -->
    <rect x="460" y="320" width="80" height="60" rx="2"/>
    <!-- Вент. тоннели -->
    <rect x="160" y="60" width="60" height="40" rx="2"/>
    <rect x="300" y="60" width="60" height="40" rx="2"/>
    <rect x="440" y="60" width="60" height="40" rx="2"/>
  </g>

  <!-- Маршруты -->
  <!-- Технический (верх) - зелёный -->
  <path id="route-technical" d="M110 240 L160 240 L160 80 L220 80 L300 80 L360 80 L440 80 L500 80 L500 100 L580 240 L580 240" fill="none" stroke="#4a7a6a" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Главный (центр) - синий -->
  <path id="route-main" d="M110 240 L160 240 L240 240 L300 240 L400 240 L460 240 L580 240" fill="none" stroke="#5a6a7a" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Сектор В (низ) - фиолетовый -->
  <path id="route-sector_v" d="M110 240 L160 240 L160 360 L240 360 L460 360 L500 360 L500 280 L580 280 L580 240" fill="none" stroke="#7a4a6a" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Метки -->
  <g font-family="monospace" fill="rgba(200,192,176,0.35)" font-size="9" letter-spacing="1">
    <text x="55" y="244">СТАРТ</text>
    <text x="600" y="244">ЦЕЛЬ</text>
    <text x="600" y="262">СЕК. Б</text>
    <text x="350" y="73">ВЕН. ТОННЕЛЬ</text>
    <text x="320" y="244">КОРИДОР</text>
    <text x="340" y="368">СЕКТОР В</text>
  </g>

  <!-- Иконка опасности сектор В -->
  <circle cx="500" cy="360" r="6" fill="none" stroke="rgba(200,80,80,0.4)" stroke-width="1"/>
  <text x="500" y="364" font-family="monospace" font-size="8" fill="rgba(200,80,80,0.5)" text-anchor="middle">!</text>

  <!-- Текущая позиция -->
  <circle cx="65" cy="240" r="5" fill="rgba(200,192,176,0.4)"/>
  <circle cx="65" cy="240" r="9" fill="none" stroke="rgba(200,192,176,0.2)" stroke-width="1"/>
</svg>